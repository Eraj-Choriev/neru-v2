<!DOCTYPE html>
<html lang="tj">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EV Charging Stations</title>
  <meta name="description" content="Ёфтани наздиктарин истгоҳи зарядкунии мошинҳои барқӣ дар Душанбе. Find the nearest EV charging station in Dushanbe, Tajikistan.">
  <meta name="theme-color" content="#05070d">
  <meta property="og:title" content="NŪR — EV Charging Stations Dushanbe">
  <meta property="og:description" content="Find & navigate to the nearest electric vehicle charging station in Dushanbe">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="">
  <link rel="stylesheet" href="css/style.css">

  <!-- Favicon + PWA -->
  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NŪR">
<script>
  (function () {
    try {
      var saved = localStorage.getItem('neru-theme');
      var theme = saved === 'light' || saved === 'dark'
        ? saved
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>

</head>
<body>
  <div class="app-container">

    <!-- ===== Header ===== -->
    <header class="header" role="banner">
      <div class="header-left">
        <a href="#" class="logo" aria-label="NŪR — Home">
          <img src="logo.png" alt="NŪR" class="logo-img">
        </a>
      </div>

      <div class="header-center">
        <div class="segmented" id="filter-seg" role="tablist" aria-label="Filter">
          <span class="seg-indicator" aria-hidden="true"></span>
          <button class="seg-btn filter-btn is-active" data-filter="all" role="tab" data-i18n="filterAll">Ҳама</button>
          <button class="seg-btn filter-btn" data-filter="available" role="tab" data-i18n="filterAvailable">Озод</button>
          <button class="seg-btn filter-btn" data-filter="120w" role="tab">120W</button>
        </div>
      </div>

      <div class="header-right">
        <button class="burger-btn" id="burger-btn" aria-label="Open menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="segmented segmented-compact" id="lang-seg" role="tablist" aria-label="Language">
          <span class="seg-indicator" aria-hidden="true"></span>
          <button class="seg-btn lang-btn is-active" data-lang="tj" role="tab">TJ</button>
          <button class="seg-btn lang-btn" data-lang="ru" role="tab">RU</button>
          <button class="seg-btn lang-btn" data-lang="en" role="tab">EN</button>
        </div>

        <button class="notif-toggle" id="notif-toggle" aria-label="Toggle notifications" title="Enable notifications">
          <span class="notif-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
          </span>
        </button>

        <label class="cosmic-toggle" title="Toggle theme" aria-label="Toggle theme">
          <input class="toggle" type="checkbox" id="theme-toggle">
          <div class="slider">
            <div class="cosmos"></div>
            <div class="energy-line"></div>
            <div class="energy-line"></div>
            <div class="energy-line"></div>
            <div class="toggle-orb">
              <div class="inner-orb"></div>
              <div class="ring"></div>
            </div>
            <div class="particles">
              <div style="--angle: 30deg" class="particle"></div>
              <div style="--angle: 60deg" class="particle"></div>
              <div style="--angle: 90deg" class="particle"></div>
              <div style="--angle: 120deg" class="particle"></div>
              <div style="--angle: 150deg" class="particle"></div>
              <div style="--angle: 180deg" class="particle"></div>
            </div>
          </div>
        </label>
      </div>
    </header>

    <!-- ===== Stats HUD — floats over map below header ===== -->
    <div class="map-stats" role="status" aria-live="polite">
      <div class="stat-cell">
        <span class="stat-num" id="stat-total">—</span>
        <span class="stat-label" data-i18n="totalStations">Истгоҳҳо</span>
      </div>
      <span class="stat-sep" aria-hidden="true"></span>
      <div class="stat-cell">
        <span class="stat-num stat-accent" id="stat-free">—</span>
        <span class="stat-label" data-i18n="availableNow">Озод</span>
      </div>
      <span class="stat-sep" aria-hidden="true"></span>
      <div class="stat-cell">
        <span class="stat-num stat-busy" id="stat-busy">—</span>
        <span class="stat-label" data-i18n="occupiedNow">Банд</span>
      </div>
      <span class="stat-sep" aria-hidden="true"></span>
      <div class="stat-cell stat-time">
        <span class="stat-live-dot" aria-hidden="true"></span>
        <span id="last-update">—</span>
      </div>
    </div>

    <!-- ===== Map ===== -->
    <div id="map"></div>

    <!-- Decorative scanline overlay (pointer-events: none) -->
    <div class="map-vignette" aria-hidden="true"></div>

    <!-- ===== Location Button ===== -->
    <button class="loc-btn" id="loc-btn" aria-label="My location">
      <span class="loc-btn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" stroke-width="1.5" opacity="0.4"/>
        </svg>
      </span>
      <span class="loc-btn-ring" aria-hidden="true"></span>
    </button>

    <!-- ===== FAB — Find Nearest ===== -->
    <button class="fab" id="fab-find" aria-label="Find nearest station">
      <span class="fab-bolt" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </span>
      <span class="fab-text-full" data-i18n="findNearest">Наздиктаринро ёб</span>
      <span class="fab-text-short" data-i18n="findNearestShort">Ёфтан</span>
      <span class="fab-arrow" aria-hidden="true">→</span>
    </button>

    <!-- ===== Calculator FAB ===== -->
    <button class="calc-fab" id="calc-fab" aria-label="Cost calculator" data-i18n-title="calcTitle" title="Калькулятор">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="4" y="3" width="16" height="18" rx="2"/>
        <line x1="8" y1="7" x2="16" y2="7"/>
        <line x1="8" y1="11" x2="10" y2="11"/>
        <line x1="12" y1="11" x2="14" y2="11"/>
        <line x1="16" y1="11" x2="16" y2="11"/>
        <line x1="8" y1="15" x2="10" y2="15"/>
        <line x1="12" y1="15" x2="16" y2="15"/>
        <line x1="8" y1="19" x2="10" y2="19"/>
        <line x1="12" y1="19" x2="16" y2="19"/>
      </svg>
    </button>

    <!-- ===== Install PWA Button ===== -->
    <button class="install-btn" id="install-btn" aria-label="Install app" hidden>
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span data-i18n="installApp">Установить</span>
    </button>

    <!-- ===== Calculator Overlay + Panel ===== -->
    <div class="calc-overlay" id="calc-overlay" aria-hidden="true"></div>

    <aside class="calc-panel" id="calc-panel" role="dialog" aria-modal="true" aria-labelledby="calc-title">
      <div class="calc-header">
        <div class="calc-title-block">
          <span class="calc-eyebrow" data-i18n="calcEyebrow">Ҳисобкунак</span>
          <h2 class="calc-title" id="calc-title" data-i18n="calcTitle">Арзиши зарядкунӣ</h2>
        </div>
        <button class="calc-close" id="calc-close" aria-label="Close">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>

      <div class="calc-body">

        <!-- Station selector -->
        <div class="calc-field">
          <label class="calc-label" for="calc-station" data-i18n="calcStation">Истгоҳ</label>
          <div class="calc-select-wrap">
            <select id="calc-station" class="calc-select">
              <option value="">—</option>
            </select>
            <svg class="calc-select-arrow" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
          <div class="calc-station-meta" id="calc-station-meta"></div>
        </div>

        <!-- Battery capacity -->
        <div class="calc-field">
          <label class="calc-label" data-i18n="calcBattery">Батарея автомобиля</label>
          <div class="calc-input-row">
            <input type="number" id="calc-battery" class="calc-input" value="60" min="10" max="300" step="1">
            <span class="calc-unit">kWh</span>
          </div>
          <div class="calc-chips" role="group">
            <button type="button" class="calc-chip" data-battery-preset="40">40</button>
            <button type="button" class="calc-chip is-active" data-battery-preset="60">60</button>
            <button type="button" class="calc-chip" data-battery-preset="75">75</button>
            <button type="button" class="calc-chip" data-battery-preset="85">85</button>
            <button type="button" class="calc-chip" data-battery-preset="100">100</button>
          </div>
        </div>

        <!-- Current battery % -->
        <div class="calc-field">
          <div class="calc-label-row">
            <label class="calc-label" for="calc-current" data-i18n="calcCurrent">Текущий заряд</label>
            <div class="calc-value-display">
              <input type="number" id="calc-current" class="calc-input calc-input-sm" value="20" min="0" max="100" step="1">
              <span class="calc-unit">%</span>
            </div>
          </div>
          <input type="range" id="calc-current-slider" class="calc-slider calc-slider--current" min="0" max="100" step="1" value="20" style="--val: 20%">
        </div>

        <!-- Target battery % -->
        <div class="calc-field">
          <div class="calc-label-row">
            <label class="calc-label" for="calc-target" data-i18n="calcTarget">Целевой заряд</label>
            <div class="calc-value-display">
              <input type="number" id="calc-target" class="calc-input calc-input-sm" value="80" min="0" max="100" step="1">
              <span class="calc-unit">%</span>
            </div>
          </div>
          <input type="range" id="calc-target-slider" class="calc-slider calc-slider--target" min="0" max="100" step="1" value="80" style="--val: 80%">
        </div>

        <!-- Tariff + Power row -->
        <div class="calc-grid-2">
          <div class="calc-field">
            <label class="calc-label" for="calc-tariff" data-i18n="calcTariff">Тариф</label>
            <div class="calc-input-row">
              <input type="number" id="calc-tariff" class="calc-input" value="1.5" min="0" step="0.01">
              <span class="calc-unit" data-i18n="somoniPerKwh">сом./кВт</span>
            </div>
          </div>
          <div class="calc-field">
            <label class="calc-label" for="calc-power" data-i18n="calcPower">Мощность</label>
            <div class="calc-input-row">
              <input type="number" id="calc-power" class="calc-input" value="60" min="1" step="1">
              <span class="calc-unit">kW</span>
            </div>
          </div>
        </div>

        <!-- Results -->
        <div class="calc-results">
          <div class="calc-result-cell">
            <span class="calc-result-label" data-i18n="calcEnergy">Энергия</span>
            <span class="calc-result-val"><span id="calc-result-kwh">0</span><span class="calc-result-unit">kWh</span></span>
          </div>
          <span class="calc-result-sep" aria-hidden="true"></span>
          <div class="calc-result-cell calc-result-cost">
            <span class="calc-result-label" data-i18n="calcCost">Стоимость</span>
            <span class="calc-result-val"><span id="calc-result-cost">0</span><span class="calc-result-unit" data-i18n="somoniPerKwhShort">сом.</span></span>
          </div>
          <span class="calc-result-sep" aria-hidden="true"></span>
          <div class="calc-result-cell">
            <span class="calc-result-label" data-i18n="calcTime">Время</span>
            <span class="calc-result-val" id="calc-result-time">—</span>
          </div>
        </div>

      </div>
    </aside>

    <!-- ===== Sidebar Overlay ===== -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar" id="sidebar" aria-label="Results">
      <div class="sidebar-header">
        <div class="sidebar-title-block">
          <span class="sidebar-eyebrow" data-i18n="recommended">Тавсияшуда</span>
          <h2 class="sidebar-title" id="sidebar-title" data-i18n="stations">Истгоҳҳо</h2>
        </div>
        <button class="sidebar-close" id="sidebar-close" aria-label="Close">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-body" id="sidebar-results">
        <!-- Rendered by JS -->
      </div>
    </aside>

    <!-- ===== Loading Overlay ===== -->
    <div class="loading-overlay" id="loading-overlay" role="status" aria-live="polite">
      <div class="loader-wrap">
        <div class="nur-loader" aria-hidden="true">
          <div style="--i: 1; --inset: 44%" class="nur-box">
            <div class="nur-loader-logo">
              <img src="logo.png" alt="" />
            </div>
          </div>
          <div style="--i: 2; --inset: 40%" class="nur-box"></div>
          <div style="--i: 3; --inset: 36%" class="nur-box"></div>
          <div style="--i: 4; --inset: 32%" class="nur-box"></div>
          <div style="--i: 5; --inset: 28%" class="nur-box"></div>
          <div style="--i: 6; --inset: 24%" class="nur-box"></div>
          <div style="--i: 7; --inset: 20%" class="nur-box"></div>
          <div style="--i: 8; --inset: 16%" class="nur-box"></div>
        </div>
        <p class="loading-text" data-i18n="loading">Боркунӣ...</p>
      </div>
    </div>

    <!-- ===== Route Panel ===== -->
    <div class="route-panel" id="route-panel" role="status" aria-live="polite">
      <div class="route-panel-track">
        <div class="route-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 12 5 10 9 14 15 8 19 12"/>
            <path d="M3 18h18"/>
          </svg>
        </div>
        <div class="route-info">
          <span class="route-dest" id="route-dest"></span>
          <div class="route-meta">
            <span class="route-distance" id="route-distance">—</span>
            <span class="route-sep" aria-hidden="true">·</span>
            <span class="route-duration" id="route-duration">—</span>
          </div>
        </div>
      </div>
      <button class="route-clear" id="route-clear" aria-label="Clear route">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
    </div>

    <!-- ===== In-app notification stack ===== -->
    <div id="neru-notif-stack" aria-live="assertive" aria-atomic="false"></div>

    <!-- ===== Mobile Drawer Overlay ===== -->
    <div class="mobile-overlay" id="mobile-overlay" aria-hidden="true"></div>

    <!-- ===== Mobile Drawer (filter + stats) ===== -->
    <div class="mobile-drawer" id="mobile-drawer" role="dialog" aria-label="Menu" aria-modal="true">
      <div class="mobile-drawer-handle" aria-hidden="true"></div>

      <div class="mobile-drawer-stats" role="status" aria-live="polite">
        <div class="mdstat-cell">
          <span class="mdstat-num" id="md-total">—</span>
          <span class="mdstat-lbl" data-i18n="totalStations">Истгоҳҳо</span>
        </div>
        <span class="mdstat-sep" aria-hidden="true"></span>
        <div class="mdstat-cell">
          <span class="mdstat-num mdstat-accent" id="md-free">—</span>
          <span class="mdstat-lbl" data-i18n="availableNow">Озод</span>
        </div>
        <span class="mdstat-sep" aria-hidden="true"></span>
        <div class="mdstat-cell">
          <span class="mdstat-num mdstat-busy" id="md-busy">—</span>
          <span class="mdstat-lbl" data-i18n="occupiedNow">Банд</span>
        </div>
      </div>

      <p class="mobile-drawer-label">Filter / Фильтр / Филтр</p>
      <div class="segmented mobile-seg" id="mobile-filter-seg" role="tablist">
        <span class="seg-indicator" aria-hidden="true"></span>
        <button class="seg-btn filter-btn is-active" data-filter="all" role="tab" data-i18n="filterAll">Ҳама</button>
        <button class="seg-btn filter-btn" data-filter="available" role="tab" data-i18n="filterAvailable">Озод</button>
        <button class="seg-btn filter-btn" data-filter="120w" role="tab">120W</button>
      </div>

      <div class="mobile-drawer-divider" aria-hidden="true"></div>

      <p class="mobile-drawer-label">Language / Язык / Забон</p>
      <div class="segmented mobile-seg" id="mobile-lang-seg" role="tablist" aria-label="Language">
        <span class="seg-indicator" aria-hidden="true"></span>
        <button class="seg-btn lang-btn is-active" data-lang="tj" role="tab">TJ</button>
        <button class="seg-btn lang-btn" data-lang="ru" role="tab">RU</button>
        <button class="seg-btn lang-btn" data-lang="en" role="tab">EN</button>
      </div>
    </div>

    <!-- ===== Toast ===== -->
    <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>

  <!-- App Modules (order matters) -->
  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/geolocation.js"></script>
  <script src="js/finder.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/router.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/pwa.js"></script>
  <script src="js/app.js"></script>
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "564d13df8dba417a9193fe33cef8e220"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
